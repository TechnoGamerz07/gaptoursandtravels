<!DOCTYPE html>
<html>
<head>
    <title>Travel Ticket Booking</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            text-align: center;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Travel Ticket Booking</h2>

    <form>
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" required>

        <label>From</label>
        <input type="text" placeholder="Departure city" required>

        <label>To</label>
        <input type="text" placeholder="Destination city" required>

        <label>Travel Date</label>
        <input type="date" required>

        <label>Transport Type</label>
        <select>
            <option>Bus</option>
            <option>Train</option>
            <option>Flight</option>
        </select>

        <label>Number of Passengers</label>
        <input type="number" min="1" required>

        <button type="submit">Book Ticket</button>
    </form>
</div>

</body>
